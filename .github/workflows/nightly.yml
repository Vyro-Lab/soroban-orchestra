name: Nightly Compatibility Matrix

on:
  schedule:
    - cron: '0 0 * * *' # Every night at midnight
  workflow_dispatch: # Allow manual trigger

permissions:
  issues: write
  contents: read

jobs:
  sdk-main-compatibility:
    name: Test vs Soroban SDK Main
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      
      - name: Patch Cargo.toml for SDK Main
        run: |
          echo '[patch.crates-io]' >> Cargo.toml
          echo 'soroban-sdk = { git = "https://github.com/stellar/rs-soroban-sdk", branch = "main" }' >> Cargo.toml
          echo 'soroban-token-sdk = { git = "https://github.com/stellar/rs-soroban-sdk", branch = "main" }' >> Cargo.toml
          echo 'stellar-xdr = { git = "https://github.com/stellar/rs-soroban-xdr", branch = "main" }' >> Cargo.toml
          
      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        
      - name: Run Tests
        id: tests
        run: cargo test --all-features
        continue-on-error: true

      - name: Report Failure to GitHub Issue
        if: steps.tests.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const issueTitle = 'Nightly SDK Compatibility Failure';
            const body = `Nightly build against soroban-sdk main branch failed. 
            View run: ${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;
            
            // Search for existing open issue
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: ['nightly-failure']
            });
            
            if (issues.data.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: issueTitle,
                body: body,
                labels: ['nightly-failure']
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues.data[0].number,
                body: body
              });
            }
